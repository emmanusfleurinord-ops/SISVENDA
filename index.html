<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisVenda - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">SisVenda 🛒</h1>
            <ul class="flex space-x-6">
                <li><a href="#" class="hover:underline">Dashboard</a></li>
                <li><a href="#" class="hover:underline">Produtos</a></li>
                <li><a href="#" class="hover:underline">Vendas</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Total em Vendas</p>
                <p class="text-3xl font-bold text-gray-800">R$ 12.450,00</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Produtos Ativos</p>
                <p class="text-3xl font-bold text-gray-800">142</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Novos Clientes</p>
                <p class="text-3xl font-bold text-gray-800">28</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-4 bg-gray-50 border-b">
                <h2 class="text-xl font-semibold text-gray-700">Últimas Movimentações</h2>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 uppercase text-sm">
                        <th class="p-4 border-b">ID</th>
                        <th class="p-4 border-b">Cliente</th>
                        <th class="p-4 border-b">Data</th>
                        <th class="p-4 border-b">Valor</th>
                        <th class="p-4 border-b">Status</th>
                    </tr>
                </thead>
                <tbody id="tabela-vendas">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
